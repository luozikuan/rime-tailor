punctuator:
  punctuator:
    import_preset: symbols
    full_shape:
      "\\" : "、"
    half_shape:
      "\\" : "、"
    digit_separators: ".:"
    digit_separator_action: commit

switches:
  switches:
    - name: zh_trad
      # reset: 0
      states: [ 汉字, 漢字 ]
    - name: personal
      reset: 1
      states: [ 🙈, 🙉 ]
    - name: show_es
      reset: 0
      states: [ 💀, 😄 ]

opencc_config:
  simplifier:
    opencc_config: s2t.json
    option_name: zh_trad

  personal:
    opencc_config: personal.json
    option_name: personal
    tips: none # all/none, "〈Personal〉"
    inherit_comment: false # 继承注释

  es_conversion:
    opencc_config: es.json
    option_name: show_es
    tips: none # all/none, "〈Emoji〉"
    inherit_comment: false # 继承注释

easy_en:
  easy_en:
    __include: easy_en.schema:/translator
    enable_completion: true
    enable_sentence: false
    initial_quality: -1

algebra:
  wanxiang_tone_to_1234:
    - xform/^(.*)ā(.*)$/$1a$2①/
    - xform/^(.*)á(.*)$/$1a$2②/
    - xform/^(.*)ǎ(.*)$/$1a$2③/
    - xform/^(.*)à(.*)$/$1a$2④/
    - xform/^(.*)ō(.*)$/$1o$2①/
    - xform/^(.*)ó(.*)$/$1o$2②/
    - xform/^(.*)ǒ(.*)$/$1o$2③/
    - xform/^(.*)ò(.*)$/$1o$2④/
    - xform/^(.*)ē(.*)$/$1e$2①/
    - xform/^(.*)é(.*)$/$1e$2②/
    - xform/^(.*)ě(.*)$/$1e$2③/
    - xform/^(.*)è(.*)$/$1e$2④/
    - xform/^(.*)ī(.*)$/$1i$2①/
    - xform/^(.*)í(.*)$/$1i$2②/
    - xform/^(.*)ǐ(.*)$/$1i$2③/
    - xform/^(.*)ì(.*)$/$1i$2④/
    - xform/^(.*)ū(.*)$/$1u$2①/
    - xform/^(.*)ú(.*)$/$1u$2②/
    - xform/^(.*)ǔ(.*)$/$1u$2③/
    - xform/^(.*)ù(.*)$/$1u$2④/
    - xform/^(.*)ǖ(.*)$/$1v$2①/
    - xform/^(.*)ǘ(.*)$/$1v$2②/
    - xform/^(.*)ǚ(.*)$/$1v$2③/
    - xform/^(.*)ǜ(.*)$/$1v$2④/
    - xform/^(.*)ü(.*)$/$1v$2/
    - xform/^(.*)ń(.*)$/$1n$2②/
    - xform/^(.*)ň(.*)$/$1n$2③/
    - xform/^(.*)ǹ(.*)$/$1n$2④/
    - xform/^(.*)ḿ(.*)(;.*)$/$1m$2②$3/
    - xform/^(.*)m̀(.*)(;.*)$/$1m$2④$3/
    - xlit/①②③④/1234
    - derive/^ng/en/

translator:
  preedit_7890_as_tone:
    __append:
      - 'xform 7 ˉ'
      - 'xform 8 ˊ'
      - 'xform 9 ˇ'
      - 'xform 0 ˋ'
  preedit_minus_slash_less_backslash_as_tone:
    __append:
      - 'xform - ˉ'
      - 'xform / ˊ'
      - 'xform < ˇ'
      - 'xform \ ˋ'
  preedit_show_tone:
    __append:
      - 'xform ([aeiou])(ng?|r)(ˉ|ˊ|ˇ|ˋ) $1$3$2'
      - 'xform ([aeo])([iuo])(ˉ|ˊ|ˇ|ˋ) $1$3$2'
      - 'xform aˉ ā'
      - 'xform aˊ á'
      - 'xform aˇ ǎ'
      - 'xform aˋ à'
      - 'xform eˉ ē'
      - 'xform eˊ é'
      - 'xform eˇ ě'
      - 'xform eˋ è'
      - 'xform oˉ ō'
      - 'xform oˊ ó'
      - 'xform oˇ ǒ'
      - 'xform oˋ ò'
      - 'xform iˉ ī'
      - 'xform iˊ í'
      - 'xform iˇ ǐ'
      - 'xform iˋ ì'
      - 'xform uˉ ū'
      - 'xform uˊ ú'
      - 'xform uˇ ǔ'
      - 'xform uˋ ù'
      - 'xform üˉ ǖ'
      - 'xform üˊ ǘ'
      - 'xform üˇ ǚ'
      - 'xform üˋ ǜ'

  pinyin_comment:
    - xform ([aeiou])(ng?|r)([1234]) $1$3$2
    - xform ([aeo])([iuo])([1234]) $1$3$2
    - xform a1 ā
    - xform a2 á
    - xform a3 ǎ
    - xform a4 à
    - xform e1 ē
    - xform e2 é
    - xform e3 ě
    - xform e4 è
    - xform o1 ō
    - xform o2 ó
    - xform o3 ǒ
    - xform o4 ò
    - xform i1 ī
    - xform i2 í
    - xform i3 ǐ
    - xform i4 ì
    - xform u1 ū
    - xform u2 ú
    - xform u3 ǔ
    - xform u4 ù
    - xform v1 ǖ
    - xform v2 ǘ
    - xform v3 ǚ
    - xform v4 ǜ
    - xform/([nljqxy])v/$1ü/
    - xform/eh[0-5]?/ê/
    - xform/([a-z]+)[0-5]/$1/


octagram:
  disable:
    __patch:
      grammar: {}
  enable_wanxiang_grammar:
    __patch:
      grammar:
        language: wanxiang-lts-zh-hans
        collocation_max_length: 8
        collocation_min_length: 2
        collocation_penalty: -10
        non_collocation_penalty: -20
        weak_collocation_penalty: -35
        rear_penalty: -12
      translator/contextual_suggestions: false
      translator/max_homophones: 5
      translator/max_homographs: 5
  enable_essay_bgw_grammar:
    __patch:
      grammar:
        language: zh-hans-t-essay-bgw
      translator/contextual_suggestions: true
      translator/max_homophones: 7
      translator/max_homographs: 7
