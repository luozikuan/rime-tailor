patch:

  # 方案列表
  schema_list:
    - {schema: wubi}
    - {schema: pinyin_flypy}
    - {schema: pinyin}
    - {schema: t9}
    - {schema: pinyin_sigma}
    - {schema: pinyin_17key}

  # 方案选单相关
  switcher:
    caption: 「方案选单」
    hotkeys:
      - Control+grave
    save_options:  # 开关记忆（方案中的 switches），从方案选单（而非快捷键）切换时会记住的选项，需要记忆的开关不能设定 reset
      - zh_trad
      - personal
      - show_es
      - wubi_spelling
    fold_options: true            # 呼出时是否折叠，多方案时建议折叠 true ，一个方案建议展开 false
    abbreviate_options: true      # 折叠时是否缩写选项
    option_list_separator: ' / '  # 折叠时的选项分隔符
