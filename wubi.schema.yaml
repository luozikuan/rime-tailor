# encoding: utf-8

schema:
  schema_id: wubi
  name: "新世纪五笔"
  version: "1.0"
  author:
    - 发明人 王永民
  description: |
    敲z键进入拼音反查
    敲~键以形查音
    敲'键造词
  dependencies:
    - pinyin
    - easy_en
    - wubi_spelling

__include: common.yaml:/opencc_config
__include: common.yaml:/punctuator
__include: common.yaml:/easy_en

switches:
  __include: common.yaml:/switches/switches
  __append:
    - name: wubi_spelling
      # reset: 0
      states: [ 拆隐, 拆显 ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - "lua_processor@*date_ts_processor" # 日期快捷上屏，须在 key_binder 之前
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - "affix_segmentor@mkst"
    - "affix_segmentor@rvlk1"
    - "affix_segmentor@zhuyin_fix"
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - reverse_lookup_translator
    - "table_translator@rvlk1"
    - table_translator
    - "table_translator@fixed"
    - "table_translator@mkst"
    - "table_translator@zhuyin_fix"
    - "history_translator@history"
    - "lua_translator@*calculator_translator"
    - "table_translator@easy_en"
  filters:
    - simplifier
    - "reverse_lookup_filter@ci_reverse_lookup"
    - "reverse_lookup_filter@zhuyin_lookup"
    - "lua_filter@*wubi_spelling"
    - "lua_filter@*date_ts"
    - "lua_filter@*autocap_filter"
    - "simplifier@es_conversion"
    - "simplifier@personal"
    #↓以下1條為去重組件(此組件必須排到最後,不然會失效).
    - uniquifier

speller:
  auto_select: false
  auto_clear: max_length
  max_code_length: 10000
  delimiter: "`"
  # 挂接的英文词库有时需要输入大写字母
  alphabet: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA
  initials: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA
  auto_select_pattern: ^[\w]{4}$
  algebra:  # 万能z键拼写处理，z符号匹配任意字符
    # - derive/^(...).$/$1z/
    # - derive/^(..).(.*)$/$1z$2/
    # - derive/^(.).(.*)$/$1z$2/
    # - derive/^.(.*)$/z$1/  # 开启本行将与z键重复上屏冲突

translator:
  dictionary: wubi.extended
  db_class: tabledb
  initial_quality: 100000
  enable_charset_filter: false
  enable_sentence: false  # 开启句子输入模式
  enable_user_dict: false
  enable_encoder: false
  encode_commit_history: false
  max_phrase_length: 4
  enable_completion: false	# 编码提示 true 开启  false 关闭
  comment_format:  #提示码自定义
    - "xform/~/ /" #去掉编码提示前的~号
    # - "xform/^/ /" #提示前面 +间距
  disable_user_dict_for_patterns:
    - "^z.*$"

fixed:
  dictionary: wubi.extended
  db_class: tabledb
  disable_user_dict_for_patterns:
    - "^z.*$"
  enable_charset_filter: false
  enable_completion: false
  enable_encoder: true  # 开启自动造词
  enable_sentence: false
  enable_user_dict: true  # 开启用户词典
  encode_commit_history: false
  initial_quality: 1000
  max_phrase_length: 4

lua_reverse_db:
  spelling: wubi_spelling

mkst:
  __include: /translator
  initial_quality: 100
  enable_sentence: true
  # prefix: "`"
  tips: "〔精准造词〕"
  tag: mkst

# 拼音反查
reverse_lookup:
  __include: /translator
  dictionary: pinyin
  tips: "〔拼音反查〕"
  preedit_format:
    - xform/([nl])v/$1ü/
    - xform/([nl])ue/$1üe/
    - xform/([jqxy])v/$1u/
  tag: rvlk2

rvlk1:
  __include: /reverse_lookup
  prefix: "z"
  tag: rvlk1
  extra_tags:
    - rvlk2

ci_reverse_lookup:
  dictionary: wubi.extended
  tips: "〔五笔滤镜〕"
  tags:
    - rvlk2

zhuyin_fix:
  __include: /translator
  prefix: '~'
  tips: "〔以形查音〕"
  tag: zhuyin_fix


zhuyin_lookup:
  dictionary: pinyin
  tags:
    - zhuyin_fix
  overwrite_comment: true
  comment_format:
    __include: common.yaml:/translator/pinyin_comment

recognizer:
  import_preset: default
  patterns:
    email: "^[A-Za-z][-_.0-9A-Za-z]*@.*$"
    mkst: "^[a-y]*`[a-y`]*$"
    punct: "^/([0-9]0?|[A-Za-z]+)$"
    rvlk1: "^z[a-z]*'?$"
    rvlk2: "^z[a-z]*'?$"
    zhuyin_fix: "~[a-y]*?$"
    expression: "^=.*$"

history:
  input: z
  size: 1
  initial_quality: 999

key_binder:
  bindings:
    - { accept: semicolon, send: 2, when: has_menu } # 分号次选
    - { accept: apostrophe, send: 3, when: has_menu } # 引号三选
    - { accept: minus, send: Page_Up, when: has_menu } # - 向后翻页
    - { accept: equal, send: Page_Down, when: has_menu } # = 向前翻页
    - { accept: Right, send: Down, when: has_menu } # 右方向键 向后移动焦点
    - { accept: Left, send: Up, when: has_menu } # 左方向键 向前移动焦点
    - {accept: "Control+Shift+dollar", toggle: zh_trad, when: always}
    - {accept: "Control+Shift+F", toggle: zh_trad, when: always}
    - {accept: "Control+Shift+P", toggle: personal, when: always}
    - {accept: "Control+Shift+E", toggle: show_es, when: always}
    - {accept: "Control+Shift+H", toggle: wubi_spelling, when: always}
